<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Love Adventure 💖</title>
<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
    overflow: hidden;
}

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

/* Start Screen */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

#startScreen h1 {
    font-size: 32px;
    color: #ff66b2;
    margin-bottom: 20px;
}

#startScreen button {
    font-size: 20px;
    padding: 15px 30px;
    border: none;
    border-radius: 20px;
    background: #ff99cc;
    cursor: pointer;
    color: white;
}

#loadingBarContainer {
    width: 300px;
    height: 20px;
    border: 2px solid #ff66b2;
    border-radius: 10px;
    margin-top: 20px;
    display: none;
}

#loadingBar {
    height: 100%;
    width: 0%;
    background-color: #ff66b2;
    border-radius: 10px;
}

/* Game Area */
#gameArea {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

#character {
    position: absolute;
    bottom: 50px;
    left: 50px;
    font-size: 50px;
    cursor: pointer;
    transition: transform 0.2s;
}

#envelope {
    position: absolute;
    bottom: 50px;
    right: 100px;
    font-size: 60px;
    cursor: pointer;
    display: none;
    transition: transform 0.5s;
}

/* Envelope Open Screen */
#envelopeScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#loveMessage {
    font-size: 22px;
    color: #cc0066;
    text-align: center;
    margin: 20px;
    max-width: 80%;
}

#finalHeart {
    font-size: 48px;
    margin-top: 20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen">
    <h1>Start Game! 🎀🐰</h1>
    <button onclick="startLoading()">Start</button>
    <div id="loadingBarContainer">
        <div id="loadingBar"></div>
    </div>
</div>

<!-- Game Area -->
<div id="gameArea">
    <div id="character">🐰</div>
    <div id="envelope">💌</div>
</div>

<!-- Envelope Screen -->
<div id="envelopeScreen">
    <div id="loveMessage">
        💖 To my special person 💖<br><br>
        You are my sunshine 🌸🌸<br>
        Every day with you makes me smile <br>
        Stay happy always 💕✨<br>
        Sending you all my love 💌🎀
    </div>
    <div id="finalHeart">M ♡ F</div>
</div>

<!-- Audio -->
<audio id="popSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
// START SCREEN + LOADING
function startLoading() {
    document.querySelector('#loadingBarContainer').style.display = 'block';
    let bar = document.querySelector('#loadingBar');
    let width = 0;
    let interval = setInterval(() => {
        width += 2;
        bar.style.width = width + '%';
        if(width >= 100) {
            clearInterval(interval);
            document.getElementById('startScreen').style.display = 'none';
            startGame();
        }
    }, 50);
}

// GAME LOGIC
function startGame() {
    document.getElementById('gameArea').style.display = 'block';
    let character = document.getElementById('character');
    let envelope = document.getElementById('envelope');
    document.getElementById('bgMusic').play();

    // Character animation (fly to envelope)
    let posX = 50;
    let posY = 50;

    let flying = setInterval(() => {
        if(posX < window.innerWidth - 200) {
            posX += 5;
            posY += 0.5; // slight fly motion
            character.style.left = posX + 'px';
            character.style.bottom = posY + 'px';
        } else {
            clearInterval(flying);
            envelope.style.display = 'block';
        }
    }, 50);

    // Character speech bubble
    setTimeout(() => {
        alert("Let's fly to the envelope! ✨🐰"); 
        document.getElementById('popSound').play();
    }, 1000);

    // Envelope click
    envelope.onclick = () => {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('envelopeScreen').style.display = 'flex';
        document.getElementById('popSound').play();
    };
}
</script>

</body>
</html>
